name: Windows CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and smoke test
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    env:
      HITSC_RELEASE_TRIPLET: x64-windows-static
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}\vcpkg-cache,readwrite

    steps:
      - name: Checkout hitsc
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read vcpkg baseline
        id: vcpkg-baseline
        run: |
          $manifest = Get-Content -Raw vcpkg.json | ConvertFrom-Json
          $baseline = $manifest.'builtin-baseline'
          if (-not $baseline) {
            throw "vcpkg.json must define builtin-baseline for CI."
          }
          "ref=$baseline" >> $env:GITHUB_OUTPUT

      - name: Set vcpkg short root
        run: |
          $workspaceRoot = [System.IO.Path]::GetPathRoot($env:GITHUB_WORKSPACE)
          if (-not $workspaceRoot) {
            throw "Could not determine workspace drive from GITHUB_WORKSPACE='$env:GITHUB_WORKSPACE'."
          }
          $vcpkgRoot = Join-Path $workspaceRoot "v"
          if (Test-Path $vcpkgRoot) {
            throw "vcpkg short root already exists: $vcpkgRoot"
          }
          New-Item -ItemType Directory -Path $vcpkgRoot | Out-Null
          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          Write-Host "Using VCPKG_ROOT=$vcpkgRoot"

      - name: Checkout vcpkg
        run: |
          git clone --no-tags https://github.com/microsoft/vcpkg.git $env:VCPKG_ROOT
          git -C $env:VCPKG_ROOT checkout --detach ${{ steps.vcpkg-baseline.outputs.ref }}

      - name: Bootstrap vcpkg
        run: |
          $bootstrap = Join-Path $env:VCPKG_ROOT "bootstrap-vcpkg.bat"
          & $bootstrap -disableMetrics

      - name: Prepare vcpkg binary cache
        run: New-Item -ItemType Directory -Force vcpkg-cache | Out-Null

      - name: Cache vcpkg binaries
        uses: actions/cache@v5
        with:
          path: vcpkg-cache
          key: ${{ runner.os }}-vcpkg-${{ env.HITSC_RELEASE_TRIPLET }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ env.HITSC_RELEASE_TRIPLET }}-

      - name: Build Release
        run: .\scripts\build_windows.ps1 -BuildType Release -Triplet $env:HITSC_RELEASE_TRIPLET

      - name: Verify static dependency closure
        run: |
          $exe = ".\build\windows-release\hitsc.exe"
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $vcvars = Join-Path $installPath "VC\Auxiliary\Build\vcvarsall.bat"
          $dump = & cmd.exe /d /s /c "call `"$vcvars`" amd64 >nul && dumpbin /dependents `"$exe`""
          $dump

          $blocked = $dump | Select-String -Pattern "VCRUNTIME|MSVCP|ucrtbase|boost_.*\.dll|SDL3\.dll|libssl|libcrypto|zlib" -CaseSensitive:$false
          if ($blocked) {
            throw "Release exe imports non-system runtime/dependency DLLs: $($blocked -join '; ')"
          }

      - name: Smoke test CLI help
        run: |
          $exe = ".\build\windows-release\hitsc.exe"
          & $exe --help
          & $exe megarac --help
          & $exe aten --help
